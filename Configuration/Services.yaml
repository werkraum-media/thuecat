services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  WerkraumMedia\ThueCat\:
    resource: '../Classes/*'
    exclude: '..Classes/Domain/Model/*'

  WerkraumMedia\ThueCat\Typo3\Hook\:
    resource: '../Classes/Typo3/Hook/*'
    public: true

  WerkraumMedia\ThueCat\Frontend\DataProcessing\:
    resource: '../Classes/Frontend/DataProcessing/*'
    public: true

  WerkraumMedia\ThueCat\Service\DateBasedFilter:
    class: 'WerkraumMedia\ThueCat\Service\DateBasedFilter\FilterBasedOnTypo3Context'
    public: true

  # The events EventEntity is instantiated outside the container (Parser's
  # ServiceLocator hands out entities without ctor args), so its runtime
  # collaborators are resolved via GeneralUtility::makeInstance. That helper
  # only goes through the container for *public* services — `public: false`
  # services fall back to `new`, which fails on classes with required ctor
  # args (DatesFactory needs Context + LogManager). This foreign ext:events
  # class can't carry our #[Autoconfigure] attribute, so it stays here.
  WerkraumMedia\Events\Service\DestinationDataImportService\DatesFactory:
    public: true

  'cache.thuecat_fetchdata':
    class: 'TYPO3\CMS\Core\Cache\Frontend\FrontendInterface'
    factory:
      - '@TYPO3\CMS\Core\Cache\CacheManager'
      - 'getCache'
    arguments:
      - 'thuecat_fetchdata'
