<html
        xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
        data-namespace-typo3-fluid="true"
>
<f:for each="{attractions}" as="attraction">
    <h2><f:link.action action="show" arguments="{attraction: attraction}" pageUid="54">{attraction.title}</f:link.action></h2>
    <p>{attraction.description}</p>
</f:for>
